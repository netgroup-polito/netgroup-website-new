apiVersion: v1
kind: Service
metadata:
  name: {{ include "netgroup-website.fullname" . }}
  labels:
    {{- include "netgroup-website.labels" . | nindent 4 }}
    lb-ipam.cilium.io/pool: public
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "netgroup-website.selectorLabels" . | nindent 4 }}
